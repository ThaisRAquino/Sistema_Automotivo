spring.application.name=sistema

# ===== Configuracao H2 (Desenvolvimento) =====
spring.datasource.url=jdbc:h2:mem:concessionaria
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== Configuracao MySQL (Producao) =====
# Descomente as linhas abaixo e comente as de H2 para usar MySQL
# spring.datasource.url=jdbc:mysql://localhost:3306/concessionaria?useSSL=false&serverTimezone=UTC
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=sua_senha
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ===== Servidor =====
server.port=8080
